name: CI/CD Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  id-token: write
  contents: read
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: rania2609
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            rania2609/notes-api:latest
            rania2609/notes-api:${{ github.sha }}
      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::249451071183:role/github-actions-eks-deploy
          aws-region: ap-south-1
      - name: Update kubeconfig
        if: github.event_name == 'push'
        run: aws eks update-kubeconfig --name notes-api-cluster --region ap-south-1
      - name: Deploy to EKS
        if: github.event_name == 'push'
        run: kubectl set image deployment/notes-api notes-api=rania2609/notes-api:${{ github.sha }}
